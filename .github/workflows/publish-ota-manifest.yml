name: Publish OTA Manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version/tag whose latest.json should become the OTA manifest
        required: true
        default: "0.7.76"

permissions:
  contents: read

jobs:
  publish:
    name: Publish latest.json (stable ${{ inputs.version }})
    runs-on: ubuntu-latest
    environment: release
    env:
      TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
      TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
      TOS_REGION: cn-beijing
      TOS_ENDPOINT: tos-cn-beijing.volces.com
      TOS_BUCKET: qihang-ai
      TOS_PUBLIC_BASE_URL: https://qihang-ai.tos-cn-beijing.volces.com
      TOS_REWRITE_ARTIFACT_URLS: "false"
      TOS_UPLOAD_REFERENCED_ARTIFACTS: "false"
      OTA_PREFIX: codexmonitor
      OTA_ARTIFACTS_DIR: release-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release manifest
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          RELEASE_TAG="${VERSION}"
          EXPECTED_MANIFEST_VERSION="${VERSION%-beta}"
          mkdir -p release-artifacts
          gh release download "v${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern latest.json \
            --dir release-artifacts \
            --clobber
          EXPECTED_MANIFEST_VERSION="${EXPECTED_MANIFEST_VERSION}" node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync("release-artifacts/latest.json","utf8")); const expected=process.env.EXPECTED_MANIFEST_VERSION; console.log(`Publishing OTA manifest version ${m.version} from release v${process.env.VERSION.replace(/^v/,"")}`); if (m.version !== expected) process.exit(1);'

      - name: Publish latest.json to TOS
        run: npm run ota:publish:tos
