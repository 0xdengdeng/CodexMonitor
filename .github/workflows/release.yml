name: Release

on:
  workflow_dispatch:
    inputs:
      sidecar_run_id:
        description: Run ID from "Build Codex Sidecar" workflow to consume (blank = latest successful)
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  actions: read  # download codex sidecar artifact from build-codex-sidecar.yml runs

env:
  RELEASE_REPOSITORY: 0xdengdeng/CodexMonitor
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build_macos:
    name: macOS bundles (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            os: macos-latest
          - target: x86_64-apple-darwin
            arch: x86_64
            os: macos-15-intel
    env:
      CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
      NOTARY_PROFILE_NAME: ${{ vars.NOTARY_PROFILE_NAME }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Download Codex sidecar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIDECAR_RUN_ID: ${{ inputs.sidecar_run_id }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ARTIFACT_NAME="codex-sidecar-${TARGET}"
          REPO=${{ github.repository }}
          if [ -n "$SIDECAR_RUN_ID" ]; then
            RUN_ID="$SIDECAR_RUN_ID"
          else
            # Scan recent runs (any conclusion) for one containing the
            # target's artifact. A run may have partial failures while
            # still having a successful job for this target — uploaded
            # artifacts persist regardless of the overall run conclusion.
            RUN_ID=""
            for CANDIDATE in $(gh run list \
              --repo "$REPO" \
              --workflow=build-codex-sidecar.yml \
              --limit 20 \
              --json databaseId \
              --jq '.[].databaseId'); do
              FOUND=$(gh api "/repos/$REPO/actions/runs/$CANDIDATE/artifacts" \
                --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id" \
                | head -1)
              if [ -n "$FOUND" ]; then
                RUN_ID="$CANDIDATE"
                break
              fi
            done
            if [ -z "$RUN_ID" ]; then
              echo "No build-codex-sidecar run found with artifact $ARTIFACT_NAME." >&2
              echo "Trigger build-codex-sidecar.yml first (optionally with target_filter=$TARGET)." >&2
              exit 1
            fi
          fi
          echo "Using sidecar artifact $ARTIFACT_NAME from run $RUN_ID"
          mkdir -p sidecar
          gh run download "$RUN_ID" \
            --repo "$REPO" \
            --name "$ARTIFACT_NAME" \
            --dir sidecar
          chmod +x sidecar/codex
          cat sidecar/metadata.txt
          # Place the sidecar where Tauri-bundler expects it. We bypass
          # sync-codex-runtime.mjs because release.yml invokes tauri via
          # `npm run tauri -- build` (no pretauri:build hook fires for that
          # script name).
          mkdir -p src-tauri/binaries
          cp sidecar/codex "src-tauri/binaries/codex-runtime-${TARGET}"
          chmod +x "src-tauri/binaries/codex-runtime-${TARGET}"
          {
            echo "AGENTDESK_CODEX_BIN=$PWD/sidecar/codex"
            echo "AGENTDESK_CODEX_TARGET=$TARGET"
          } >> "$GITHUB_ENV"

      - name: Prepare macOS bundled Git
        env:
          AGENTDESK_GIT_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf src-tauri/resources/git
          mkdir -p src-tauri/resources/git
          npm run sync:git-sidecar

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          CERT_PATH=cert.p12

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            echo "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"

      - name: Configure notarytool credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_B64: ${{ secrets.APPLE_API_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "$APPLE_API_PRIVATE_KEY_B64" | base64 --decode > private_keys/AuthKey.p8
          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --key "private_keys/AuthKey.p8"

      - name: Write Tauri signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/agentdesk.key"

      - name: Build app bundle
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/agentdesk.key")"
          npm run tauri -- build --target ${{ matrix.target }} --bundles app

      - name: Bundle OpenSSL and re-sign
        env:
          APP_PATH: src-tauri/target/${{ matrix.target }}/release/bundle/macos/启航AI智慧平台.app
          DAEMON_BINARY_PATH: src-tauri/target/${{ matrix.target }}/release/agentdesk-daemon
          DAEMONCTL_BINARY_PATH: src-tauri/target/${{ matrix.target }}/release/agentdesk-daemonctl
          MAC_TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          CODESIGN_IDENTITY="$CODESIGN_IDENTITY" \
            scripts/macos-fix-openssl.sh "$APP_PATH"

      - name: Notarize and staple
        env:
          APP_PATH: src-tauri/target/${{ matrix.target }}/release/bundle/macos/启航AI智慧平台.app
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          ditto -c -k --keepParent "$APP_PATH" "AgentDesk-${ARCH}-notarize.zip"

          set +e
          submit_json=$(xcrun notarytool submit "AgentDesk-${ARCH}-notarize.zip" \
            --keychain-profile "$NOTARY_PROFILE_NAME" \
            --wait \
            --output-format json 2>&1)
          submit_exit=$?
          set -e

          echo "$submit_json"
          submission_id=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("id", ""))' <<< "$submit_json" 2>/dev/null || true)
          notary_status=$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("status", ""))' <<< "$submit_json" 2>/dev/null || true)
          if [ "$submit_exit" -ne 0 ] || [ "$notary_status" != "Accepted" ]; then
            echo "Notarization failed with status: ${notary_status:-unknown}" >&2
            if [ -n "$submission_id" ]; then
              xcrun notarytool log "$submission_id" \
                --keychain-profile "$NOTARY_PROFILE_NAME" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"

      - name: Package artifacts
        env:
          APP_PATH: src-tauri/target/${{ matrix.target }}/release/bundle/macos/启航AI智慧平台.app
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/macos
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mkdir -p release-artifacts release-artifacts/dmg-root
          rm -rf "release-artifacts/dmg-root/启航AI智慧平台.app"
          ditto "$APP_PATH" "release-artifacts/dmg-root/启航AI智慧平台.app"

          ditto -c -k --keepParent "$APP_PATH" "release-artifacts/AgentDesk-${ARCH}.zip"

          hdiutil create -volname "启航AI智慧平台" \
            -srcfolder release-artifacts/dmg-root \
            -ov -format UDZO \
            "release-artifacts/AgentDesk_${VERSION}_${ARCH}.dmg"

          COPYFILE_DISABLE=1 tar -czf \
            "${BUNDLE_DIR}/AgentDesk.app.tar.gz" \
            -C "${BUNDLE_DIR}" "启航AI智慧平台.app"

          npm run tauri signer sign -- \
            -f "$HOME/.tauri/agentdesk.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "${BUNDLE_DIR}/AgentDesk.app.tar.gz"

          cp "${BUNDLE_DIR}/AgentDesk.app.tar.gz" \
            "release-artifacts/AgentDesk-${ARCH}.app.tar.gz"
          cp "${BUNDLE_DIR}/AgentDesk.app.tar.gz.sig" \
            "release-artifacts/AgentDesk-${ARCH}.app.tar.gz.sig"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            release-artifacts/AgentDesk-${{ matrix.arch }}.zip
            release-artifacts/AgentDesk_*_${{ matrix.arch }}.dmg
            release-artifacts/AgentDesk-${{ matrix.arch }}.app.tar.gz
            release-artifacts/AgentDesk-${{ matrix.arch }}.app.tar.gz.sig

  build_windows:
    runs-on: windows-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      WINDOWS_CERTIFICATE_B64: ${{ secrets.WINDOWS_CERTIFICATE_B64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_SELF_SIGNED_RELEASE_CERT: ${{ vars.WINDOWS_SELF_SIGNED_RELEASE_CERT }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install LLVM (bindgen)
        run: choco install llvm -y --no-progress

      - name: Configure LLVM (bindgen)
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: install frontend dependencies
        run: npm ci

      - name: Download Codex sidecar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIDECAR_RUN_ID: ${{ inputs.sidecar_run_id }}
          TARGET: x86_64-pc-windows-msvc
          # Git Bash on the Windows runner rewrites URL paths starting with
          # `/` into local filesystem paths (MSYS posix conversion). Disable
          # it so gh api calls hit the right endpoint.
          MSYS_NO_PATHCONV: "1"
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_NAME="codex-sidecar-${TARGET}"
          REPO=${{ github.repository }}
          if [ -n "$SIDECAR_RUN_ID" ]; then
            RUN_ID="$SIDECAR_RUN_ID"
          else
            RUN_ID=""
            for CANDIDATE in $(gh run list \
              --repo "$REPO" \
              --workflow=build-codex-sidecar.yml \
              --limit 20 \
              --json databaseId \
              --jq '.[].databaseId'); do
              FOUND=$(gh api "/repos/$REPO/actions/runs/$CANDIDATE/artifacts" \
                --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id" \
                | head -1)
              if [ -n "$FOUND" ]; then
                RUN_ID="$CANDIDATE"
                break
              fi
            done
            if [ -z "$RUN_ID" ]; then
              echo "No build-codex-sidecar run found with artifact $ARTIFACT_NAME." >&2
              echo "Trigger build-codex-sidecar.yml first (optionally with target_filter=$TARGET)." >&2
              exit 1
            fi
          fi
          echo "Using sidecar artifact $ARTIFACT_NAME from run $RUN_ID"
          mkdir -p sidecar
          gh run download "$RUN_ID" \
            --repo "$REPO" \
            --name "$ARTIFACT_NAME" \
            --dir sidecar
          cat sidecar/metadata.txt
          # Place the sidecar where Tauri-bundler expects it. (Same reason as
          # macOS — `npm run tauri -- build` doesn't fire pretauri hooks.)
          mkdir -p src-tauri/binaries
          cp sidecar/codex.exe "src-tauri/binaries/codex-runtime-${TARGET}.exe"
          {
            echo "AGENTDESK_CODEX_BIN=$PWD/sidecar/codex.exe"
            echo "AGENTDESK_CODEX_TARGET=$TARGET"
          } >> "$GITHUB_ENV"

      - name: Prepare Windows bundled Git
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = "x86_64-pc-windows-msvc"
          $gitRoot = Join-Path $env:ProgramFiles "Git"
          $gitExe = Join-Path $gitRoot "bin\git.exe"
          if (-not (Test-Path $gitExe)) {
            throw "Git for Windows was not found at $gitExe"
          }

          $resourcesRoot = "src-tauri/resources/git"
          Remove-Item -Path $resourcesRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $resourcesRoot | Out-Null
          $resourceDir = Join-Path $resourcesRoot $target
          New-Item -ItemType Directory -Force -Path $resourceDir | Out-Null
          Copy-Item -Path (Join-Path $gitRoot "*") -Destination $resourceDir -Recurse -Force
          $unusedLaunchers = @(
            "git-bash.exe",
            "git-cmd.exe",
            "unins*.exe",
            "cmd\git-gui.exe",
            "cmd\gitk.exe",
            "mingw64\bin\git-gui.exe",
            "mingw64\bin\gitk.exe",
            "usr\bin\mintty.exe"
          )
          foreach ($pattern in $unusedLaunchers) {
            Remove-Item -Path (Join-Path $resourceDir $pattern) -Force -ErrorAction SilentlyContinue
          }

          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Copy-Item -Path $gitExe -Destination "src-tauri/binaries/git-$target.exe" -Force
          & $gitExe --version

      - name: Write Tauri signing key
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = base64.b64decode(os.environ["TAURI_SIGNING_PRIVATE_KEY_B64"])
          home = Path.home()
          target = home / ".tauri"
          target.mkdir(parents=True, exist_ok=True)
          (target / "agentdesk.key").write_bytes(raw)
          PY

      - name: Import Windows code signing certificate
        shell: pwsh
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Stop"
          $usePfxReleaseCert = [string]::Equals(
            $env:WINDOWS_SELF_SIGNED_RELEASE_CERT,
            "false",
            [StringComparison]::OrdinalIgnoreCase
          )

          if (-not $usePfxReleaseCert) {
            $cert = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=Qihang AI Self-Signed Release" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -KeyExportPolicy Exportable `
              -KeySpec Signature `
              -KeyLength 3072 `
              -HashAlgorithm SHA256 `
              -NotAfter (Get-Date).AddMonths(6)

            $thumbprint = $cert.Thumbprint.ToUpperInvariant()
          } else {
            $required = @(
              "WINDOWS_CERTIFICATE_B64",
              "WINDOWS_CERTIFICATE_PASSWORD",
              "WINDOWS_CERTIFICATE_THUMBPRINT"
            )
            foreach ($name in $required) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
                throw "Missing required secret-backed environment variable: $name"
              }
            }

            $certificatePath = Join-Path $env:RUNNER_TEMP "agentdesk-codesign.pfx"
            [IO.File]::WriteAllBytes(
              $certificatePath,
              [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_B64)
            )
            $password = ConvertTo-SecureString `
              -String $env:WINDOWS_CERTIFICATE_PASSWORD `
              -AsPlainText `
              -Force
            Import-PfxCertificate `
              -FilePath $certificatePath `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password $password | Out-Null

            $thumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT.Replace(" ", "").ToUpperInvariant()
            $cert = Get-ChildItem "Cert:\CurrentUser\My\$thumbprint" -ErrorAction SilentlyContinue
          }

          $cert = Get-ChildItem "Cert:\CurrentUser\My\$thumbprint" -ErrorAction SilentlyContinue
          if ($null -eq $cert) {
            throw "Imported Windows code signing certificate was not found by the configured thumbprint."
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Write Windows signing config
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $thumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT.Replace(" ", "").ToUpperInvariant()
          $config = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
          }
          $config |
            ConvertTo-Json -Depth 5 |
            Set-Content -Path "src-tauri/tauri.windows.signing.conf.json" -Encoding UTF8

      - name: build windows bundles
        shell: bash
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/agentdesk.key")"
          # NSIS only — OTA uses the .exe installer, MSI's WiX light.exe has
          # been flaky on the runner.
          npm run doctor:win
          npm run sync:material-icons
          npm run sync:codex-runtime:release
          npm run tauri -- build --config src-tauri/tauri.windows.conf.json --bundles nsis --config src-tauri/tauri.windows.signing.conf.json

      - name: Verify Windows installer Authenticode signature
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $expectedThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT.Replace(" ", "").ToUpperInvariant()
          $allowUntrustedSelfSigned = -not ([string]::Equals(
            $env:WINDOWS_SELF_SIGNED_RELEASE_CERT,
            "false",
            [StringComparison]::OrdinalIgnoreCase
          ))
          $installers = Get-ChildItem `
            -Path "src-tauri/target/release/bundle/nsis" `
            -Filter "*.exe" `
            -File
          if ($installers.Count -eq 0) {
            throw "No NSIS installer exe was produced."
          }

          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
            if ($null -eq $signature.SignerCertificate) {
              throw "No Authenticode signer was found for $($installer.Name): $($signature.Status)"
            }
            $actualThumbprint = $signature.SignerCertificate.Thumbprint.ToUpperInvariant()
            if ($actualThumbprint -ne $expectedThumbprint) {
              throw "Unexpected signer for $($installer.Name)."
            }
            if ($signature.Status -ne "Valid" -and -not $allowUntrustedSelfSigned) {
              throw "Invalid Authenticode signature for $($installer.Name): $($signature.Status)"
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/msi/*.msi*

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - build_macos
      - build_windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts

      - name: Normalize release artifact filenames
        run: |
          set -euo pipefail
          while IFS= read -r -d '' artifact; do
            dir=$(dirname "$artifact")
            file=$(basename "$artifact")
            normalized="${file// /.}"
            if [ "$file" = "$normalized" ]; then
              continue
            fi
            target="${dir}/${normalized}"
            if [ -e "$target" ]; then
              echo "Cannot normalize filename because target already exists: $target"
              exit 1
            fi
            echo "Renaming $artifact -> $target"
            mv "$artifact" "$target"
          done < <(find release-artifacts -type f -name '* *' -print0)

      - name: Build latest.json
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          output = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              output.append(title)
              output.extend([f"- {item}" for item in items])
              output.append("")

          notes = "\n".join(output).strip()
          if not notes:
              notes = "- No user-facing changes."

          Path("release-artifacts/release-notes.md").write_text(notes + "\n")
          PY

          python3 - <<PY
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import quote

          notes = Path("release-artifacts/release-notes.md").read_text().strip()
          artifacts_dir = Path("release-artifacts")

          release_repository = "${RELEASE_REPOSITORY}"

          def release_url(filename):
            return f"https://github.com/{release_repository}/releases/download/v${VERSION}/{quote(filename)}"

          def detect_arch(name):
            lowered = name.lower()
            if "aarch64" in lowered or "arm64" in lowered:
              return "aarch64"
            if "x86_64" in lowered or "amd64" in lowered:
              return "x86_64"
            return None

          platforms = {}
          macos_tarballs = sorted(artifacts_dir.glob("AgentDesk-*.app.tar.gz"))
          if not macos_tarballs:
            raise SystemExit("No macOS artifacts (AgentDesk-*.app.tar.gz) found for latest.json")
          for tarball in macos_tarballs:
            arch = detect_arch(tarball.name)
            if not arch:
              raise SystemExit(f"Cannot detect arch from macOS artifact: {tarball.name}")
            sig_path = tarball.with_suffix(tarball.suffix + ".sig")
            if not sig_path.exists():
              raise SystemExit(f"Missing signature for {tarball.name}")
            platforms[f"darwin-{arch}"] = {
              "url": release_url(tarball.name),
              "signature": sig_path.read_text().strip(),
            }

          exe_candidates = sorted(artifacts_dir.rglob("*.exe"), key=lambda p: p.name.lower())
          windows_installer = None
          preferred_installers = []
          for candidate in exe_candidates:
            lowered = candidate.name.lower()
            if "agentdesk" in lowered and ("setup" in lowered or "installer" in lowered):
              preferred_installers.append(candidate)
          if preferred_installers:
            windows_installer = preferred_installers[0]
          else:
            for candidate in exe_candidates:
              lowered = candidate.name.lower()
              if "setup" in lowered or "installer" in lowered:
                windows_installer = candidate
                break
            if windows_installer is None and exe_candidates:
              windows_installer = exe_candidates[0]
          if windows_installer is None:
            raise SystemExit("No Windows installer (.exe) found for latest.json")

          print(f"Selected Windows installer for latest.json: {windows_installer.name}")

          win_sig_path = windows_installer.with_suffix(windows_installer.suffix + ".sig")
          if not win_sig_path.exists():
            raise SystemExit(f"Missing signature for {windows_installer.name}")

          platforms["windows-x86_64"] = {
            "url": release_url(windows_installer.name),
            "signature": win_sig_path.read_text().strip(),
          }

          payload = {
            "version": "${VERSION}",
            "notes": notes,
            "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "platforms": platforms,
          }

          Path("release-artifacts/latest.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Validate latest.json artifact references
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          artifacts_dir = Path("release-artifacts")
          latest_path = artifacts_dir / "latest.json"
          payload = json.loads(latest_path.read_text())
          available_files = {path.name for path in artifacts_dir.rglob("*") if path.is_file()}

          missing = []
          for platform, metadata in payload.get("platforms", {}).items():
            url = metadata.get("url", "")
            filename = Path(unquote(urlparse(url).path)).name
            if filename not in available_files:
              missing.append((platform, filename))

          if missing:
            print("latest.json references missing artifacts:")
            for platform, filename in missing:
              print(f"- {platform}: {filename}")
            raise SystemExit(1)

          print(f"Validated {len(payload.get('platforms', {}))} latest.json platform URL(s).")
          PY

      # TOS publish first: latest.json on TOS is the OTA endpoint clients
      # actually consult (tauri.conf.json pins it). GitHub release is a
      # backup channel. If TOS fails, skipping the GH release step leaves
      # no half-published state pointing at missing files.
      - name: Publish to TOS
        timeout-minutes: 120
        env:
          TOS_ACCESS_KEY_ID: ${{ secrets.TOS_ACCESS_KEY_ID }}
          TOS_SECRET_ACCESS_KEY: ${{ secrets.TOS_SECRET_ACCESS_KEY }}
          TOS_REGION: cn-beijing
          TOS_ENDPOINT: tos-cn-beijing.volces.com
          TOS_BUCKET: qihang-ai
          TOS_PUBLIC_BASE_URL: https://qihang-ai.tos-cn-beijing.volces.com
          OTA_PREFIX: codexmonitor
          OTA_ARTIFACTS_DIR: release-artifacts
        run: |
          set -euo pipefail
          # release-artifacts/ contains files with the names Tauri produced
          # (Chinese-named .exe etc). publish-tos.mjs uploads them as-is and
          # rewrites latest.json's GitHub URLs to TOS URLs that match.
          npm ci
          npm run ota:publish:tos

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          shopt -s nullglob globstar
          mapfile -t macos_zips < <(find release-artifacts -type f -name 'AgentDesk-*.zip' | sort)
          mapfile -t macos_dmgs < <(find release-artifacts -type f -name 'AgentDesk_*.dmg' | sort)
          mapfile -t macos_tarballs < <(find release-artifacts -type f -name 'AgentDesk-*.app.tar.gz' | sort)
          mapfile -t macos_sigs < <(find release-artifacts -type f -name 'AgentDesk-*.app.tar.gz.sig' | sort)
          mapfile -t windows_exes < <(find release-artifacts -type f -name '*.exe*' | sort)
          if [ ${#macos_tarballs[@]} -eq 0 ]; then
            echo "No macOS .app.tar.gz artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#macos_dmgs[@]} -eq 0 ]; then
            echo "No macOS .dmg artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#windows_exes[@]} -eq 0 ]; then
            echo "No Windows .exe artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          # MSI is optional — NSIS-only Windows builds produce no .msi.

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$GITHUB_SHA" \
            "${macos_zips[@]}" \
            "${macos_dmgs[@]}" \
            "${macos_tarballs[@]}" \
            "${macos_sigs[@]}" \
            "${windows_exes[@]}" \
            release-artifacts/latest.json

      # Post-release version bump is left to a human commit. The auto-PR
      # path required granting GitHub Actions PR-create permission on the
      # repo, which is an extra setting churn for negligible benefit.
