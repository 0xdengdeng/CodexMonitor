name: Release

on:
  workflow_dispatch:
    inputs:
      sidecar_run_id:
        description: Run ID from "Build Codex Sidecar" workflow to consume (blank = latest successful)
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  actions: read  # download codex sidecar artifact from build-codex-sidecar.yml runs

env:
  RELEASE_REPOSITORY: 0xdengdeng/CodexMonitor

jobs:
  build_macos:
    name: macOS bundles (${{ matrix.arch }})
    runs-on: macos-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    env:
      CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
      NOTARY_PROFILE_NAME: ${{ vars.NOTARY_PROFILE_NAME }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Download Codex sidecar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIDECAR_RUN_ID: ${{ inputs.sidecar_run_id }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ARTIFACT_NAME="codex-sidecar-${TARGET}"
          REPO=${{ github.repository }}
          if [ -n "$SIDECAR_RUN_ID" ]; then
            RUN_ID="$SIDECAR_RUN_ID"
          else
            # Scan recent runs (any conclusion) for one containing the
            # target's artifact. A run may have partial failures while
            # still having a successful job for this target — uploaded
            # artifacts persist regardless of the overall run conclusion.
            RUN_ID=""
            for CANDIDATE in $(gh run list \
              --repo "$REPO" \
              --workflow=build-codex-sidecar.yml \
              --limit 20 \
              --json databaseId \
              --jq '.[].databaseId'); do
              FOUND=$(gh api "/repos/$REPO/actions/runs/$CANDIDATE/artifacts" \
                --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id" \
                | head -1)
              if [ -n "$FOUND" ]; then
                RUN_ID="$CANDIDATE"
                break
              fi
            done
            if [ -z "$RUN_ID" ]; then
              echo "No build-codex-sidecar run found with artifact $ARTIFACT_NAME." >&2
              echo "Trigger build-codex-sidecar.yml first (optionally with target_filter=$TARGET)." >&2
              exit 1
            fi
          fi
          echo "Using sidecar artifact $ARTIFACT_NAME from run $RUN_ID"
          mkdir -p sidecar
          gh run download "$RUN_ID" \
            --repo "$REPO" \
            --name "$ARTIFACT_NAME" \
            --dir sidecar
          chmod +x sidecar/codex
          cat sidecar/metadata.txt
          {
            echo "AGENTDESK_CODEX_BIN=$PWD/sidecar/codex"
            echo "AGENTDESK_CODEX_TARGET=$TARGET"
          } >> "$GITHUB_ENV"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          CERT_PATH=cert.p12

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            echo "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN"

      - name: Configure notarytool credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_B64: ${{ secrets.APPLE_API_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p private_keys
          echo "$APPLE_API_PRIVATE_KEY_B64" | base64 --decode > private_keys/AuthKey.p8
          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --key "private_keys/AuthKey.p8"

      - name: Write Tauri signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/agentdesk.key"

      - name: Build app bundle
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/agentdesk.key")"
          npm run tauri -- build --target ${{ matrix.target }} --bundles app

      - name: Bundle OpenSSL and re-sign
        env:
          APP_PATH: src-tauri/target/${{ matrix.target }}/release/bundle/macos/启航AI智慧平台.app
          DAEMON_BINARY_PATH: src-tauri/target/${{ matrix.target }}/release/agentdesk-daemon
          DAEMONCTL_BINARY_PATH: src-tauri/target/${{ matrix.target }}/release/agentdesk-daemonctl
          MAC_TARGET_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          CODESIGN_IDENTITY="$CODESIGN_IDENTITY" \
            scripts/macos-fix-openssl.sh "$APP_PATH"

      - name: Notarize and staple
        env:
          APP_PATH: src-tauri/target/${{ matrix.target }}/release/bundle/macos/启航AI智慧平台.app
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          ditto -c -k --keepParent "$APP_PATH" "AgentDesk-${ARCH}-notarize.zip"

          xcrun notarytool submit "AgentDesk-${ARCH}-notarize.zip" \
            --keychain-profile "$NOTARY_PROFILE_NAME" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Package artifacts
        env:
          APP_PATH: src-tauri/target/${{ matrix.target }}/release/bundle/macos/启航AI智慧平台.app
          BUNDLE_DIR: src-tauri/target/${{ matrix.target }}/release/bundle/macos
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mkdir -p release-artifacts release-artifacts/dmg-root
          rm -rf "release-artifacts/dmg-root/启航AI智慧平台.app"
          ditto "$APP_PATH" "release-artifacts/dmg-root/启航AI智慧平台.app"

          ditto -c -k --keepParent "$APP_PATH" "release-artifacts/AgentDesk-${ARCH}.zip"

          hdiutil create -volname "启航AI智慧平台" \
            -srcfolder release-artifacts/dmg-root \
            -ov -format UDZO \
            "release-artifacts/AgentDesk_${VERSION}_${ARCH}.dmg"

          COPYFILE_DISABLE=1 tar -czf \
            "${BUNDLE_DIR}/AgentDesk.app.tar.gz" \
            -C "${BUNDLE_DIR}" "启航AI智慧平台.app"

          npm run tauri signer sign -- \
            -f "$HOME/.tauri/agentdesk.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "${BUNDLE_DIR}/AgentDesk.app.tar.gz"

          cp "${BUNDLE_DIR}/AgentDesk.app.tar.gz" \
            "release-artifacts/AgentDesk-${ARCH}.app.tar.gz"
          cp "${BUNDLE_DIR}/AgentDesk.app.tar.gz.sig" \
            "release-artifacts/AgentDesk-${ARCH}.app.tar.gz.sig"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            release-artifacts/AgentDesk-${{ matrix.arch }}.zip
            release-artifacts/AgentDesk_*_${{ matrix.arch }}.dmg
            release-artifacts/AgentDesk-${{ matrix.arch }}.app.tar.gz
            release-artifacts/AgentDesk-${{ matrix.arch }}.app.tar.gz.sig

  build_windows:
    runs-on: windows-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install LLVM (bindgen)
        run: choco install llvm -y --no-progress

      - name: Configure LLVM (bindgen)
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: install frontend dependencies
        run: npm ci

      - name: Download Codex sidecar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIDECAR_RUN_ID: ${{ inputs.sidecar_run_id }}
          TARGET: x86_64-pc-windows-msvc
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_NAME="codex-sidecar-${TARGET}"
          REPO=${{ github.repository }}
          if [ -n "$SIDECAR_RUN_ID" ]; then
            RUN_ID="$SIDECAR_RUN_ID"
          else
            RUN_ID=""
            for CANDIDATE in $(gh run list \
              --repo "$REPO" \
              --workflow=build-codex-sidecar.yml \
              --limit 20 \
              --json databaseId \
              --jq '.[].databaseId'); do
              FOUND=$(gh api "/repos/$REPO/actions/runs/$CANDIDATE/artifacts" \
                --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id" \
                | head -1)
              if [ -n "$FOUND" ]; then
                RUN_ID="$CANDIDATE"
                break
              fi
            done
            if [ -z "$RUN_ID" ]; then
              echo "No build-codex-sidecar run found with artifact $ARTIFACT_NAME." >&2
              echo "Trigger build-codex-sidecar.yml first (optionally with target_filter=$TARGET)." >&2
              exit 1
            fi
          fi
          echo "Using sidecar artifact $ARTIFACT_NAME from run $RUN_ID"
          mkdir -p sidecar
          gh run download "$RUN_ID" \
            --repo "$REPO" \
            --name "$ARTIFACT_NAME" \
            --dir sidecar
          cat sidecar/metadata.txt
          {
            echo "AGENTDESK_CODEX_BIN=$PWD/sidecar/codex.exe"
            echo "AGENTDESK_CODEX_TARGET=$TARGET"
          } >> "$GITHUB_ENV"

      - name: Write Tauri signing key
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = base64.b64decode(os.environ["TAURI_SIGNING_PRIVATE_KEY_B64"])
          home = Path.home()
          target = home / ".tauri"
          target.mkdir(parents=True, exist_ok=True)
          (target / "agentdesk.key").write_bytes(raw)
          PY

      - name: build windows bundles
        shell: bash
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/agentdesk.key")"
          # NSIS only — OTA uses the .exe installer, MSI's WiX light.exe has
          # been flaky on the runner.
          npm run tauri:build:win -- --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/msi/*.msi*

  release:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - build_macos
      - build_windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-artifacts-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts

      - name: Normalize release artifact filenames
        run: |
          set -euo pipefail
          while IFS= read -r -d '' artifact; do
            dir=$(dirname "$artifact")
            file=$(basename "$artifact")
            normalized="${file// /.}"
            if [ "$file" = "$normalized" ]; then
              continue
            fi
            target="${dir}/${normalized}"
            if [ -e "$target" ]; then
              echo "Cannot normalize filename because target already exists: $target"
              exit 1
            fi
            echo "Renaming $artifact -> $target"
            mv "$artifact" "$target"
          done < <(find release-artifacts -type f -name '* *' -print0)

      - name: Build latest.json
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          output = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              output.append(title)
              output.extend([f"- {item}" for item in items])
              output.append("")

          notes = "\n".join(output).strip()
          if not notes:
              notes = "- No user-facing changes."

          Path("release-artifacts/release-notes.md").write_text(notes + "\n")
          PY

          python3 - <<PY
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import quote

          notes = Path("release-artifacts/release-notes.md").read_text().strip()
          artifacts_dir = Path("release-artifacts")

          release_repository = "${RELEASE_REPOSITORY}"

          def release_url(filename):
            return f"https://github.com/{release_repository}/releases/download/v${VERSION}/{quote(filename)}"

          def detect_arch(name):
            lowered = name.lower()
            if "aarch64" in lowered or "arm64" in lowered:
              return "aarch64"
            if "x86_64" in lowered or "amd64" in lowered:
              return "x86_64"
            return None

          platforms = {}
          macos_tarballs = sorted(artifacts_dir.glob("AgentDesk-*.app.tar.gz"))
          if not macos_tarballs:
            raise SystemExit("No macOS artifacts (AgentDesk-*.app.tar.gz) found for latest.json")
          for tarball in macos_tarballs:
            arch = detect_arch(tarball.name)
            if not arch:
              raise SystemExit(f"Cannot detect arch from macOS artifact: {tarball.name}")
            sig_path = tarball.with_suffix(tarball.suffix + ".sig")
            if not sig_path.exists():
              raise SystemExit(f"Missing signature for {tarball.name}")
            platforms[f"darwin-{arch}"] = {
              "url": release_url(tarball.name),
              "signature": sig_path.read_text().strip(),
            }

          exe_candidates = sorted(artifacts_dir.rglob("*.exe"), key=lambda p: p.name.lower())
          windows_installer = None
          preferred_installers = []
          for candidate in exe_candidates:
            lowered = candidate.name.lower()
            if "agentdesk" in lowered and ("setup" in lowered or "installer" in lowered):
              preferred_installers.append(candidate)
          if preferred_installers:
            windows_installer = preferred_installers[0]
          else:
            for candidate in exe_candidates:
              lowered = candidate.name.lower()
              if "setup" in lowered or "installer" in lowered:
                windows_installer = candidate
                break
            if windows_installer is None and exe_candidates:
              windows_installer = exe_candidates[0]
          if windows_installer is None:
            raise SystemExit("No Windows installer (.exe) found for latest.json")

          print(f"Selected Windows installer for latest.json: {windows_installer.name}")

          win_sig_path = windows_installer.with_suffix(windows_installer.suffix + ".sig")
          if not win_sig_path.exists():
            raise SystemExit(f"Missing signature for {windows_installer.name}")

          platforms["windows-x86_64"] = {
            "url": release_url(windows_installer.name),
            "signature": win_sig_path.read_text().strip(),
          }

          payload = {
            "version": "${VERSION}",
            "notes": notes,
            "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "platforms": platforms,
          }

          Path("release-artifacts/latest.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Validate latest.json artifact references
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          artifacts_dir = Path("release-artifacts")
          latest_path = artifacts_dir / "latest.json"
          payload = json.loads(latest_path.read_text())
          available_files = {path.name for path in artifacts_dir.rglob("*") if path.is_file()}

          missing = []
          for platform, metadata in payload.get("platforms", {}).items():
            url = metadata.get("url", "")
            filename = Path(unquote(urlparse(url).path)).name
            if filename not in available_files:
              missing.append((platform, filename))

          if missing:
            print("latest.json references missing artifacts:")
            for platform, filename in missing:
              print(f"- {platform}: {filename}")
            raise SystemExit(1)

          print(f"Validated {len(payload.get('platforms', {}))} latest.json platform URL(s).")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          shopt -s nullglob globstar
          mapfile -t macos_zips < <(find release-artifacts -type f -name 'AgentDesk-*.zip' | sort)
          mapfile -t macos_dmgs < <(find release-artifacts -type f -name 'AgentDesk_*.dmg' | sort)
          mapfile -t macos_tarballs < <(find release-artifacts -type f -name 'AgentDesk-*.app.tar.gz' | sort)
          mapfile -t macos_sigs < <(find release-artifacts -type f -name 'AgentDesk-*.app.tar.gz.sig' | sort)
          mapfile -t windows_exes < <(find release-artifacts -type f -name '*.exe*' | sort)
          if [ ${#macos_tarballs[@]} -eq 0 ]; then
            echo "No macOS .app.tar.gz artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#macos_dmgs[@]} -eq 0 ]; then
            echo "No macOS .dmg artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          if [ ${#windows_exes[@]} -eq 0 ]; then
            echo "No Windows .exe artifacts found for release upload"
            find release-artifacts -type f | sort
            exit 1
          fi
          # MSI is optional — NSIS-only Windows builds produce no .msi.

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$GITHUB_SHA" \
            "${macos_zips[@]}" \
            "${macos_dmgs[@]}" \
            "${macos_tarballs[@]}" \
            "${macos_sigs[@]}" \
            "${windows_exes[@]}" \
            release-artifacts/latest.json

      - name: Bump version and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          NEXT_VERSION=$(python3 - <<'PY' "$VERSION"
          import sys

          version = sys.argv[1]
          parts = version.split(".")
          if len(parts) != 3:
              raise SystemExit("Expected version like 0.X.Y")

          major, minor, patch = (int(p) for p in parts)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version "$NEXT_VERSION" --no-git-tag-version

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$NEXT_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.toml")
          content = path.read_text()
          content, count = re.subn(
            r'(?m)^version = ".*"$',
            'version = "$NEXT_VERSION"',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update src-tauri/Cargo.toml version")
          path.write_text(content)
          PY

          python3 - <<PY
          import re
          from pathlib import Path

          path = Path("src-tauri/Cargo.lock")
          content = path.read_text()
          content, count = re.subn(
            r'(?ms)(\[\[package\]\]\nname = "agentdesk"\nversion = ")[^"]+(")',
            r'\g<1>$NEXT_VERSION\2',
            content,
            count=1,
          )
          if count != 1:
            raise SystemExit("Failed to update agentdesk version in src-tauri/Cargo.lock")
          path.write_text(content)
          PY

          python3 - <<PY
          import plistlib
          from pathlib import Path

          path = Path("src-tauri/gen/apple/codex-monitor_iOS/Info.plist")
          with path.open("rb") as f:
            data = plistlib.load(f)

          data["CFBundleShortVersionString"] = "$NEXT_VERSION"
          data["CFBundleVersion"] = "$NEXT_VERSION"

          with path.open("wb") as f:
            plistlib.dump(data, f, sort_keys=False)
          PY

          git checkout -b "chore/bump-version-${NEXT_VERSION}"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json src-tauri/gen/apple/codex-monitor_iOS/Info.plist
          git commit -m "chore: bump version to ${NEXT_VERSION}"
          git push origin "chore/bump-version-${NEXT_VERSION}"

